<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Proxy Browser</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #19191a; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .nav { padding: 10px; background: #222; display: flex; gap: 8px; border-bottom: 1px solid #333; }
        input { flex: 1; background: #111; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 8px; outline: none; font-size: 14px; }
        button { background: #447bba; color: #fff; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .container { flex: 1; width: 100%; position: relative; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
        .loader { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: #447bba; z-index: 100; }
        .loader.active { display: block; animation: load 1.5s infinite; }
        @keyframes load { 0% { left: -30%; width: 30%; } 100% { left: 100%; width: 30%; } }
    </style>
</head>
<body>
    <div class="nav">
        <input type="text" id="urlInput" placeholder="https://google.com" value="https://duckduckgo.com">
        <button onclick="browse()">GO</button>
    </div>
    <div class="container">
        <div id="loader" class="loader"></div>
        <iframe id="browser-frame" src="about:blank"></iframe>
    </div>

    <script>
        vkBridge.send("VKWebAppInit");

        function browse() {
            const input = document.getElementById('urlInput');
            let url = input.value.trim();
            if (!url) return;
            if (!url.startsWith('http')) url = 'https://' + url;
            input.value = url;

            const loader = document.getElementById('loader');
            loader.classList.add('active');

            const proxyUrl = "/proxy?url=" + encodeURIComponent(url);
            const frame = document.getElementById('browser-frame');
            frame.src = proxyUrl;

            frame.onload = () => loader.classList.remove('active');
        }

        window.onload = browse;
    </script>
</body>
</html>
