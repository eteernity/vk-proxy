<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VK Proxy Browser</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #19191a; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .nav { padding: 10px; background: #222; display: flex; gap: 8px; border-bottom: 1px solid #333; align-items: center; }
        input { flex: 1; background: #111; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 8px; outline: none; font-size: 14px; }
        button { background: #447bba; color: #fff; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #frame-container { flex: 1; width: 100%; position: relative; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
        .loader { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #447bba; z-index: 100; }
        .loader.active { display: block; animation: loading 2s infinite; }
        @keyframes loading { 0% { width: 0; } 100% { width: 100%; } }
    </style>
</head>
<body>

    <div class="nav">
        <input type="text" id="urlInput" placeholder="Введите адрес..." value="https://google.com">
        <button onclick="browse()">GO</button>
    </div>

    <div id="frame-container">
        <div id="loader" class="loader"></div>
        <iframe id="browser-frame" name="browser-frame" src="about:blank"></iframe>
    </div>

    <script>
        (function initVK() {
            if (typeof vkBridge !== 'undefined') {
                vkBridge.send("VKWebAppInit").catch(err => console.error(err));
            }
        })();

        function browse() {
            const urlInput = document.getElementById('urlInput');
            let url = urlInput.value.trim();
            const frame = document.getElementById('browser-frame');
            const loader = document.getElementById('loader');

            if (!url) return;
            if (!url.startsWith('http')) url = 'https://' + url;
            urlInput.value = url;

            loader.classList.add('active');

            const proxyUrl = "/proxy?url=" + encodeURIComponent(url);
            frame.src = proxyUrl;

            frame.onload = function() {
                loader.classList.remove('active');
            };
        }
        
        window.onload = browse;
    </script>
</body>
</html>
