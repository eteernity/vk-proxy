<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Browser</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #19191a; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .nav { padding: 8px; background: #222; display: flex; gap: 5px; border-bottom: 1px solid #333; }
        input { flex: 1; background: #111; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 6px; outline: none; font-size: 14px; }
        button { background: #447bba; color: #fff; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .view-area { flex: 1; width: 100%; position: relative; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
        #error-msg { display: none; position: absolute; top: 50%; width: 100%; text-align: center; color: #000; z-index: 10; }
    </style>
</head>
<body>
    <div class="nav">
        <input type="text" id="urlInput" placeholder="Введите адрес..." value="https://duckduckgo.com">
        <button onclick="browse()">GO</button>
    </div>
    <div class="view-area">
        <div id="error-msg">Идет загрузка или домен заблокирован...</div>
        <iframe id="browser-frame" src="about:blank"></iframe>
    </div>

    <script>
        vkBridge.send("VKWebAppInit");

        function browse() {
            const input = document.getElementById('urlInput');
            let url = input.value.trim();
            if (!url) return;
            if (!url.startsWith('http')) url = 'https://' + url;
            
            const frame = document.getElementById('browser-frame');
            const error = document.getElementById('error-msg');
            
            error.style.display = 'block';
            
            // Основной адрес прокси
            const proxyUrl = "/proxy?url=" + encodeURIComponent(url);
            frame.src = proxyUrl;

            frame.onload = () => {
                error.style.display = 'none';
            };
        }

        window.onerror = function() {
            document.getElementById('error-msg').innerHTML = "Ошибка сети. Возможно, Vercel заблокирован.";
        };

        window.onload = browse;
    </script>
</body>
</html>
