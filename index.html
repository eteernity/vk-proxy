<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VK Proxy Browser</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #19191a; color: #fff; font-family: -apple-system, system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .nav { padding: 12px; background: #222; display: flex; gap: 8px; border-bottom: 1px solid #333; z-index: 10; }
        input { flex: 1; background: #111; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 10px; outline: none; font-size: 16px; }
        button { background: #447bba; color: #fff; border: none; padding: 0 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #view { flex: 1; background: #fff; color: #000; overflow: auto; -webkit-overflow-scrolling: touch; position: relative; }
        .loader { display: none; padding: 20px; text-align: center; color: #888; background: #19191a; position: absolute; width: 100%; top: 50px; z-index: 5; }
    </style>
</head>
<body>

    <div class="nav">
        <input type="text" id="urlInput" placeholder="https://google.com" value="https://google.com">
        <button onclick="browse()">GO</button>
    </div>

    <div id="loader" class="loader">Загрузка через прокси...</div>
    <div id="view">
        <div style="padding: 40px; text-align: center; color: #666;">
            Введите адрес сайта и нажмите GO.
        </div>
    </div>

    <script>
        (function initVK() {
            if (typeof vkBridge !== 'undefined') {
                vkBridge.send("VKWebAppInit").catch(err => console.error(err));
            }
        })();

        async function browse(forcedUrl) {
            const urlInput = document.getElementById('urlInput');
            let url = forcedUrl || urlInput.value.trim();
            const view = document.getElementById('view');
            const loader = document.getElementById('loader');

            if (!url) return;
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            urlInput.value = url;

            loader.style.display = "block";

            try {
                const proxyUrl = "/proxy?url=" + encodeURIComponent(url);
                const response = await fetch(proxyUrl);
                
                if (!response.ok) throw new Error("Ошибка сервера: " + response.status);
                
                let html = await response.text();

                // Убираем target="_blank", чтобы ссылки не открывались в новых вкладках
                html = html.replace(/target="_blank"/g, 'target="_self"');

                const baseTag = `<base href="${url}/">`;
                view.innerHTML = baseTag + html;

                // Перехватываем клики по всем ссылкам внутри view
                const links = view.getElementsByTagName('a');
                for (let link of links) {
                    link.onclick = function(e) {
                        const href = this.getAttribute('href');
                        // Если ссылка не якорная и не пустая, грузим через прокси
                        if (href && !href.startsWith('#') && !href.startsWith('javascript:')) {
                            e.preventDefault();
                            browse(this.href); 
                            return false;
                        }
                    };
                }

                loader.style.display = "none";
                view.scrollTop = 0;
            } catch (e) {
                loader.style.display = "none";
                view.innerHTML = `<div style="padding:20px; color:red"><b>Ошибка:</b> ${e.message}</div>`;
            }
        }
    </script>
</body>
</html>
